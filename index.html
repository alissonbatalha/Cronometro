<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronômetro - Countdown</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app-container">
    <h1 class="app-title">Cronômetro</h1>
    
    <div class="timer-box" role="region" aria-label="Controle do cronômetro">
      
      <form class="timer-inputs" id="timerForm" novalidate>
        <div class="input-group">
          <label for="minutesInput">Minutos</label>
          <input 
            type="number" 
            id="minutesInput" 
            min="0" 
            max="59" 
            value="0"
            aria-label="Número de minutos"
            aria-describedby="minutesError"
          >
          <span id="minutesError" class="error-message" role="alert"></span>
        </div>

        <div class="input-group">
          <label for="secondsInput">Segundos</label>
          <input 
            type="number" 
            id="secondsInput" 
            min="0" 
            max="59" 
            value="0"
            aria-label="Número de segundos"
            aria-describedby="secondsError"
          >
          <span id="secondsError" class="error-message" role="alert"></span>
        </div>

        <div class="button-group">
          <button type="button" id="startBtn" class="btn btn-primary" aria-label="Iniciar cronômetro">
            Iniciar
          </button>
          <button type="button" id="pauseBtn" class="btn btn-secondary" disabled aria-label="Pausar cronômetro">
            Pausar
          </button>
          <button type="button" id="resetBtn" class="btn btn-danger" disabled aria-label="Resetar cronômetro">
            Resetar
          </button>
        </div>
      </form>

      <div class="timer-display" role="timer" aria-live="polite" aria-atomic="true">
        <h2 id="timeDisplay" class="time-value">00:00</h2>
        <p class="timer-status" id="timerStatus" aria-label="Status do cronômetro"></p>
      </div>
    </div>

    <footer class="footer">
      <p>Desenvolvido por <a href="https://github.com/alissonbatalha" target="_blank" rel="noopener">Alisson Batalha</a></p>
    </footer>
  </main>

  <script src="script.js" type="module"></script>
</body>
</html>
